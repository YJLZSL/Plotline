<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 径向暖色渐变背景 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#F0B982" />
      <stop offset="40%" stop-color="#DC873C" />
      <stop offset="75%" stop-color="#B46423" />
      <stop offset="100%" stop-color="#964B19" />
    </radialGradient>
    
    <!-- 柔和阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#502A14" flood-opacity="0.25" />
    </filter>
    
    <!-- 内边框高光 -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.15)" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="36" y="36" width="440" height="440" rx="113" ry="113" fill="url(#bgGrad)" />
  
  <!-- 内边框高光 -->
  <rect x="40" y="40" width="432" height="432" rx="109" ry="109" fill="none" stroke="url(#highlight)" stroke-width="2.5" />
  
  <!-- 笔杆 -->
  <path d="M 199,170 L 229,160 L 270,275 L 240,285 Z" fill="white" filter="url(#shadow)" />
  
  <!-- 笔尖（菱形） -->
  <path d="M 270,275 L 295,295 L 270,315 L 245,295 Z" fill="white" filter="url(#shadow)" />
  
  <!-- 羽毛小装饰（左） -->
  <path d="M 214,165 Q 200,145 185,150 Q 195,160 199,170" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- 羽毛小装饰（右） -->
  <path d="M 214,165 Q 228,145 243,150 Q 233,160 229,170" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- 波浪故事线 -->
  <path d="M 180,320 C 220,300 240,360 280,340 C 320,320 340,380 380,360" fill="none" stroke="white" stroke-width="13" stroke-linecap="round" filter="url(#shadow)" opacity="0.96" />
  
  <!-- 节点 1 -->
  <circle cx="220" cy="336" r="7" fill="white" filter="url(#shadow)" />
  <!-- 节点 2 -->
  <circle cx="280" cy="340" r="7" fill="white" filter="url(#shadow)" />
  <!-- 节点 3 -->
  <circle cx="340" cy="356" r="7" fill="white" filter="url(#shadow)" />
</svg>