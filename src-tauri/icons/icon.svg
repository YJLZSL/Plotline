<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9A05B" />
      <stop offset="55%" stop-color="#C68A3E" />
      <stop offset="100%" stop-color="#A86A2C" />
    </linearGradient>
    <linearGradient id="featherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F5EFE3" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3A2E26" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="104" ry="104" fill="url(#bgGrad)" />

  <rect x="36" y="36" width="440" height="440" rx="100" ry="100" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2" />

  <!-- 时间线主轴 -->
  <line x1="120" y1="360" x2="392" y2="360" stroke="rgba(255,255,255,0.55)" stroke-width="6" stroke-linecap="round" />

  <!-- 时间线节点 -->
  <circle cx="168" cy="360" r="10" fill="#FFFFFF" opacity="0.92" />
  <circle cx="256" cy="360" r="11" fill="#FFFFFF" />
  <circle cx="344" cy="360" r="10" fill="#FFFFFF" opacity="0.92" />

  <!-- 羽毛笔笔身（从右上向左下斜插至时间线中央节点） -->
  <path
    d="M 372 108
       Q 386 112 388 128
       Q 386 144 368 158
       L 272 254
       Q 258 268 256 284
       L 256 360
       L 250 360
       Q 248 280 246 268
       Q 244 256 258 242
       L 360 140
       Q 372 128 372 108 Z"
    fill="url(#featherGrad)"
    filter="url(#softShadow)"
  />

  <!-- 羽毛叶脉（笔身右侧的柔和羽枝） -->
  <path
    d="M 362 138 Q 374 130 380 118
       M 352 150 Q 364 142 370 130
       M 342 162 Q 354 154 360 142
       M 332 174 Q 344 166 350 154
       M 322 186 Q 334 178 340 166"
    stroke="rgba(255,255,255,0.7)"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />

  <!-- 墨点（笔尖触碰时间线节点处） -->
  <circle cx="256" cy="360" r="14" fill="#FFFFFF" opacity="0.3" />
</svg>
